<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEARS OF DESERT // TERMINAL</title>
    <style>
        :root {
            --cor-terminal: #63c0a0;
            --cor-fundo: #0a0f0d;
            --cor-alerta: #ff5555;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-terminal);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Efeito de linhas de TV antiga (CRT Scanlines) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .terminal-box {
            border: 2px solid var(--cor-terminal);
            padding: 40px;
            background: rgba(10, 15, 13, 0.9);
            box-shadow: 0 0 20px rgba(99, 192, 160, 0.2);
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: fecharFoco 0.5s ease-out;
        }

        .terminal-header {
            border-bottom: 1px dashed var(--cor-terminal);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .status-blink {
            animation: piscar 1s infinite;
        }

        .log-text {
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #4a8b75;
        }

        /* Botão Marcante de Login */
        .btn-autenticar {
            display: block;
            width: 100%;
            background: transparent;
            border: 2px solid var(--cor-terminal);
            color: var(--cor-terminal);
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 rgba(99, 192, 160, 0);
        }

        .btn-autenticar:hover {
            background: var(--cor-terminal);
            color: var(--cor-fundo);
            box-shadow: 0 0 15px rgba(99, 192, 160, 0.5);
        }

        .decoracao-cantos::before, .decoracao-cantos::after {
            content: "[⚙️]";
            position: absolute;
            font-size: 10px;
            opacity: 0.5;
        }
        .decoracao-cantos::before { top: 10px; left: 10px; }
        .decoracao-cantos::after { bottom: 10px; right: 10px; }

        @keyframes piscar {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="terminal-box decoracao-cantos">
        <div class="terminal-header">
            <div style="font-size: 11px; float: right;">REV_10K.DC</div>
            <h2 style="margin: 0; letter-spacing: 1px;">GEARS VTT // CORE</h2>
            <div style="font-size: 12px; margin-top: 5px;">
                STATUS: <span class="status-blink" style="color: var(--cor-alerta);">REQUER AUTENTICAÇÃO_</span>
            </div>
        </div>

        <div class="log-text">
            > INICIALIZANDO DIRETÓRIO DE COMANDO...<br>
            > CONEXÃO COM O DESERTO: ATIVA<br>
            > BANCO DE DADOS: AGUARDANDO CREDENCIAIS DO OPERADOR...<br>
            > AVISO: REGISTROS NÃO SINCRONIZADOS SERÃO PERDIDOS NO FLUXO.
        </div>

        <button class="btn-autenticar" id="btn-login-core" onclick="window.fazerLoginComGoogle()">
            [ 🔑 INICIAR DIRETRIZ: GOOGLE ]
        </button>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

      // 1. Facilidade absoluta: Suas chaves ficam isoladas aqui
      const firebaseConfig = {
  apiKey: "AIzaSyC9a9k39aToZcZ5_zwWqNM_4vFXELoYoTI",
  authDomain: "gears-of-desert.firebaseapp.com",
  projectId: "gears-of-desert",
  storageBucket: "gears-of-desert.firebasestorage.app",
  messagingSenderId: "860761444217",
  appId: "1:860761444217:web:62107c127835d8583aa9a8"
};


      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // 2. A função que o botão em cima chama pelo clique
      window.fazerLoginComGoogle = function() {
          const botao = document.getElementById('btn-login-core');
          botao.innerHTML = "[ PROCESSANDO MATRIZ... ]";
          botao.disabled = true;

          signInWithPopup(auth, provider)
            .then((result) => {
                const user = result.user;
                
                // Grava as informações na sessão para as abas 'mestre' e 'fichas' lerem
                sessionStorage.setItem('usuario_id', user.uid);
                sessionStorage.setItem('usuario_nome', user.displayName);
                
                botao.innerHTML = "[ OPERADOR RECONHECIDO ]";
                botao.style.borderColor = "#63c0a0";

                setTimeout(() => {
                    // Direciona o jogador para o Hub Principal após o sucesso
                    window.location.href = 'index.html'; 
                }, 1000);

            }).catch((error) => {
                console.error("Falha no terminal: ", error);
                botao.innerHTML = "[ FALHA NA AUTENTICAÇÃO - TENTE DE NOVO ]";
                botao.style.borderColor = "var(--cor-alerta)";
                botao.disabled = false;
            });
      }
    </script>

</body>
</html>
